name: My Local Config
version: 1.0.0
schema: v1

# The models you'll see in the Chat dropdown
models:
  - name: Qwen 2.5 Coder 7B (Ollama)
    provider: ollama
    model: qwen2.5-coder:7b
    roles:
      - chat
      - edit

  # Fast model for background Autocomplete (gray text)
  - name: Qwen 1.5B Autocomplete
    provider: ollama
    model: qwen2.5-coder:1.5b
    roles:
      - autocomplete

  # The brain for @codebase indexing
  - name: Nomic Embed
    provider: ollama
    model: nomic-embed-text
    roles:
      - embed

# Optional: Add a custom command for your professional UI updates
rules:
  - name: Professional UI Refactor
    role: system
    content: |
      When asked to refactor, transform "basic" UI code into "professional" 
      Next.js components using Tailwind CSS and Lucide icons. 
      Focus on spacing, modern typography, and clean hover states.
